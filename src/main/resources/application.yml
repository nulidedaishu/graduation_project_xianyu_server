server:
  port: 8080
  address: 0.0.0.0

# Sa-Token配置
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # token有效期，单位秒，默认30天, -1代表永不过期 
  timeout: 2592000
  # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # JWT秘钥
  jwt-secret-key: mySecretKeyForSecondHandPlatformWhichShouldBeLongEnoughAndSecure123456

# JWT配置
jwt:
  secret: mySecretKeyForSecondHandPlatformWhichShouldBeLongEnoughAndSecure123456
  expiration: 2592000000  # 30天，单位毫秒

# 支付宝配置
alipay:
  app-id: ${ALIPAY_APP_ID:your_app_id}
  private-key: ${ALIPAY_PRIVATE_KEY:your_private_key}
  public-key: ${ALIPAY_PUBLIC_KEY:your_public_key}
  server-url: ${ALIPAY_SERVER_URL:https://openapi.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/payment/alipay/notify}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:8080/payment/success}

