server:
  port: 8080
  address: 0.0.0.0

# Sa-Token配置
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # token有效期，单位秒，默认30天, -1代表永不过期 
  timeout: 2592000
  # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # JWT秘钥 - 生产环境请通过环境变量注入
  jwt-secret-key: ${JWT_SECRET_KEY:mySecretKeyForSecondHandPlatformWhichShouldBeLongEnoughAndSecure123456}

# JWT配置
jwt:
  secret: ${JWT_SECRET_KEY:mySecretKeyForSecondHandPlatformWhichShouldBeLongEnoughAndSecure123456}
  expiration: 2592000000  # 30天，单位毫秒

# 支付宝配置
alipay:
  app-id: ${ALIPAY_APP_ID:your_app_id}
  private-key: ${ALIPAY_PRIVATE_KEY:your_private_key}
  public-key: ${ALIPAY_PUBLIC_KEY:your_public_key}
  server-url: ${ALIPAY_SERVER_URL:https://openapi.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/payment/alipay/notify}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:8080/payment/success}

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://47.101.161.4:3306/secondhand_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:se_dfh28x39y}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 2MB
  data:
    redis:
      host: ${REDIS_HOST:47.101.161.4}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      password: ${REDIS_PASSWORD:rfuj9_2y4}
  rabbitmq:
    host: ${RABBITMQ_HOST:47.101.161.4}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    # 消费者配置
    listener:
      simple:
        # 并发消费者的最小数量
        concurrency: 2
        # 并发消费者的最大数量
        max-concurrency: 10
        # 每次从队列获取的消息数（预取）
        prefetch: 1
        # 自动确认模式（生产环境建议用 manual 手动确认）
        acknowledge-mode: auto
        # 消费失败重试配置
        retry:
          enabled: true
          # 最大重试次数
          max-attempts: 3
          # 初始重试间隔（毫秒）
          initial-interval: 1000
          # 重试间隔倍数
          multiplier: 2
          # 最大重试间隔（毫秒）
          max-interval: 10000
    # 连接超时配置
    connection-timeout: 10000
    # 心跳间隔（秒）
    requested-heartbeat: 30
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

mybatis-plus:
  # 全局配置
  global-config:
    db-config:
      id-type: auto # 主键ID自增策略
      logic-delete-field: isdeleted  # 字段名
      logic-not-delete-value: 0   # 未删除时的值（0）
      logic-delete-value: 1     # 删除时的值（当前时间）
      table-underline: true # 表名下划线转换
      capital-mode: false # 数据库大写转换

  # 配置Mapper扫描路径
  mapper-locations: classpath*:/mapper/**/*.xml

  # 类型别名包扫描路径
  type-aliases-package: com.yy.wechat.model.entity

  # 配置项
  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 日志实现
    map-underscore-to-camel-case: true # 下划线转驼峰
    cache-enabled: true # 开启二级缓存
    default-fetch-size: 100 # 获取记录条数限制
    default-statement-timeout: 30 # 超时时间(秒)
    call-setters-on-nulls: true # 结果集中空值也调用setter

# 行政区划数据导入配置
region:
  import:
    enabled: true  # 是否启用自动导入
    file-path: classpath:pca.json  # JSON文件路径
    batch-size: 500  # 批量插入大小（暂未使用，保留用于未来扩展）
    default-country-id: 1  # 默认国家ID（中国）
    check-duplicate: true  # 是否检查重复数据

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html          # Swagger UI 访问路径
    tags-sorter: alpha              # 标签按字母排序
    operations-sorter: alpha        # 操作按字母排序
    doc-expansion: none             # 默认折叠所有标签
    default-models-expand-depth: 1  # 默认展开模型深度
    display-request-duration: true  # 显示请求耗时
  api-docs:
    path: /v3/api-docs              # API Docs 访问路径
    enabled: true                   # 启用 API Docs
  show-actuator: false
  packages-to-scan: xyz.yaungyue.secondhand.controller
  info:
    title: 闲鱼二手交易平台 API
    description: 闲鱼二手交易平台后端接口文档
    version: 1.0.0
    contact:
      name: 作者
      email: contact@example.com
  # 安全配置 - 添加 Authorization 请求头
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

logging:
  level:
    io.lettuce.core: WARN  # 减少Redis详细连接日志
    org.springframework.data.redis.core: WARN
    # 将框架日志级别设置为WARN，减少无关输出
    org.springframework: WARN
    org.springframework.web: WARN
    org.springframework.boot: WARN
    org.springframework.security: WARN
    org.springframework.aop: WARN
    org.springframework.transaction: WARN
    org.springframework.cache: WARN
    org.springframework.data: WARN
    com.baomidou.mybatisplus: WARN
    org.apache.ibatis: WARN
    org.hibernate: WARN
    ch.qos.logback: WARN
    org.apache.catalina: WARN
    org.apache.tomcat: WARN
    org.eclipse.jetty: WARN
    io.undertow: WARN
    org.jboss: WARN
    cn.dev33: WARN  # Sa-Token日志
    # 业务包保持INFO级别，便于查看接口请求响应
    xyz.yaungyue.secondhand: INFO