server:
  port: 8080

# Sa-Token配置
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # token有效期，单位秒，默认30天, -1代表永不过期 
  timeout: 2592000
  # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # JWT秘钥
  jwt-secret-key: mySecretKeyForSecondHandPlatformWhichShouldBeLongEnoughAndSecure123456

# JWT配置
jwt:
  secret: mySecretKeyForSecondHandPlatformWhichShouldBeLongEnoughAndSecure123456
  expiration: 86400000  # 24小时，单位毫秒
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/secondhand_platform?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 2MB
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  # 全局配置
  global-config:
    db-config:
      id-type: auto # 主键ID自增策略
      logic-delete-field: isdeleted  # 字段名
      logic-not-delete-value: 0   # 未删除时的值（0）
      logic-delete-value: 1     # 删除时的值（当前时间）
      table-underline: true # 表名下划线转换
      capital-mode: false # 数据库大写转换

  # 配置Mapper扫描路径
  mapper-locations: classpath*:/mapper/**/*.xml

  # 类型别名包扫描路径
  type-aliases-package: com.yy.wechat.model.entity

  # 配置项
  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 日志实现
    map-underscore-to-camel-case: true # 下划线转驼峰
    cache-enabled: true # 开启二级缓存
    default-fetch-size: 100 # 获取记录条数限制
    default-statement-timeout: 30 # 超时时间(秒)
    call-setters-on-nulls: true # 结果集中空值也调用setter


logging:
  level:
    io.lettuce.core: DEBUG  # 打印Redis命令和响应
    org.springframework.data.redis.core: DEBUG