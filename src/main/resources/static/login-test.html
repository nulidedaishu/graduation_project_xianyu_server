<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录功能测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>二手交易平台登录测试</h1>
    
    <div id="loginForm">
        <h2>用户登录</h2>
        <div class="form-group">
            <label for="username">用户名:</label>
            <input type="text" id="username" placeholder="请输入用户名" value="admin">
        </div>
        <div class="form-group">
            <label for="password">密码:</label>
            <input type="password" id="password" placeholder="请输入密码" value="123456">
        </div>
        <button onclick="login()">登录</button>
        <button onclick="clearResult()">清空结果</button>
    </div>

    <div id="userInfo" class="hidden">
        <h2>用户信息</h2>
        <div id="userDetails"></div>
        <button onclick="logout()">登出</button>
        <button onclick="showLoginForm()">重新登录</button>
    </div>

    <div id="result" class="result hidden"></div>

    <script>
        const API_BASE_URL = 'http://localhost:8080';
        let authToken = '';

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showResult('请填写完整的用户名和密码', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (data.code === 200) {
                    authToken = data.data.token;
                    showUserInfo(data.data.user);
                    showResult(JSON.stringify(data, null, 2), 'success');
                } else {
                    showResult(`登录失败: ${data.message}`, 'error');
                }
            } catch (error) {
                showResult(`网络错误: ${error.message}`, 'error');
            }
        }

        async function logout() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/logout`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                if (data.code === 200) {
                    authToken = '';
                    showLoginForm();
                    showResult('登出成功', 'success');
                }
            } catch (error) {
                showResult(`登出失败: ${error.message}`, 'error');
            }
        }

        function showUserInfo(user) {
            const userInfoDiv = document.getElementById('userInfo');
            const userDetailsDiv = document.getElementById('userDetails');
            
            userDetailsDiv.innerHTML = `
                <p><strong>ID:</strong> ${user.id}</p>
                <p><strong>用户名:</strong> ${user.username}</p>
                <p><strong>昵称:</strong> ${user.nickname || '未设置'}</p>
                <p><strong>手机号:</strong> ${user.phone || '未设置'}</p>
                <p><strong>头像:</strong> ${user.avatar || '未设置'}</p>
                <p><strong>访问令牌:</strong> ${authToken.substring(0, 50)}...</p>
            `;
            
            document.getElementById('loginForm').classList.add('hidden');
            userInfoDiv.classList.remove('hidden');
        }

        function showLoginForm() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('userInfo').classList.add('hidden');
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = `result ${type}`;
            resultDiv.classList.remove('hidden');
        }

        function clearResult() {
            document.getElementById('result').classList.add('hidden');
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('登录页面已加载');
        });
    </script>
</body>
</html>
